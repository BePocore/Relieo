name: Deploy Media Worker

# Deploys the Cloudflare media Worker whenever its code or this workflow changes.
on:
  push:
    branches:
      - main
    paths:
      - "worker/**"
      - ".github/workflows/deploy-media-worker.yml"
  workflow_dispatch:

concurrency:
  group: deploy-media-worker
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy relieo-media
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install Worker dependencies
        run: npm ci

      - name: Typecheck Worker
        run: npm run typecheck

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
