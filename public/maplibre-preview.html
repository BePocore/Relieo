<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Rando3D — Aperçu MapLibre</title>

    <!-- MapLibre GL : moteur carte léger (2D/3D). Chargé depuis le CDN pour cet
         aperçu autonome — aucune dépendance ajoutée au projet. -->
    <link
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

    <style>
      :root {
        --accent: #3cdc8c;
        --ink: #0c1512;
        --glass: rgba(16, 26, 22, 0.72);
        --border: rgba(255, 255, 255, 0.16);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: Inter, system-ui, -apple-system, sans-serif;
        background: var(--ink);
        color: #eaf5ef;
        overflow: hidden;
      }
      #map { position: absolute; inset: 0; }

      /* Bandeau d'info + réglages (haut). */
      .hud {
        position: absolute;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        right: 12px;
        z-index: 5;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        pointer-events: none;
      }
      .hud > * { pointer-events: auto; }
      .badge,
      .seg button,
      .ctrl {
        border: 1px solid var(--border);
        border-radius: 11px;
        background: var(--glass);
        color: #eaf5ef;
        backdrop-filter: blur(16px) saturate(1.3);
        -webkit-backdrop-filter: blur(16px) saturate(1.3);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 38px;
        padding: 0 12px;
        font-size: 0.82rem;
        font-weight: 800;
      }
      .badge .dot {
        width: 18px; height: 18px; border-radius: 6px;
        display: grid; place-items: center;
        background: var(--accent); color: var(--ink);
        font-weight: 900; font-size: 0.7rem;
      }
      .seg { display: inline-flex; gap: 4px; padding: 4px; border-radius: 13px;
        background: var(--glass); border: 1px solid var(--border); }
      .seg button {
        border: 0; background: transparent; box-shadow: none;
        min-height: 30px; padding: 0 12px; border-radius: 9px;
        font-size: 0.78rem; font-weight: 800; cursor: pointer; color: #cfe6da;
      }
      .seg button.active { background: var(--accent); color: var(--ink); }
      .ctrl {
        display: inline-flex; align-items: center; gap: 8px;
        min-height: 38px; padding: 0 12px; font-size: 0.78rem; font-weight: 800;
        cursor: pointer;
      }
      .ctrl input { accent-color: var(--accent); }

      /* Marqueurs HTML (clustering natif MapLibre). */
      .mk {
        cursor: pointer;
        width: 54px; height: 40px;
        border-radius: 9px;
        background: #20302a center/cover no-repeat;
        border: 2px solid #fff;
        box-shadow: 0 4px 12px rgba(8, 14, 11, 0.45);
      }
      .mk.dot {
        width: 26px; height: 26px; border-radius: 50%;
        border: 2px solid #fff;
      }
      .mk-wrap { position: relative; }
      .mk-count {
        position: absolute; top: -8px; right: -8px;
        min-width: 22px; height: 22px; padding: 0 5px;
        display: grid; place-items: center;
        border-radius: 999px;
        background: var(--ink); color: #fff;
        font-size: 0.72rem; font-weight: 800;
        border: 2px solid #fff;
      }

      .toast {
        position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%);
        z-index: 6; max-width: min(560px, calc(100% - 24px));
        padding: 10px 14px; border-radius: 12px;
        background: var(--glass); border: 1px solid var(--border);
        font-size: 0.8rem; font-weight: 700; text-align: center;
        backdrop-filter: blur(16px);
      }
      .loading {
        position: absolute; inset: 0; z-index: 8;
        display: grid; place-items: center;
        background: var(--ink); font-weight: 800; gap: 10px;
      }
      .spin {
        width: 34px; height: 34px; border-radius: 50%;
        border: 3px solid rgba(255,255,255,0.18); border-top-color: var(--accent);
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .hint {
        position: absolute; right: 12px; bottom: 12px; z-index: 5;
        max-width: 230px; padding: 9px 11px; border-radius: 11px;
        background: var(--glass); border: 1px solid var(--border);
        font-size: 0.72rem; font-weight: 650; line-height: 1.4; color: #cfe6da;
        backdrop-filter: blur(16px);
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div class="hud">
      <span class="badge"><span class="dot">3D</span> Aperçu MapLibre</span>
      <div class="seg" id="basemap">
        <button data-base="sat" class="active">Satellite</button>
        <button data-base="topo">Topo</button>
      </div>
      <label class="ctrl">
        <input type="checkbox" id="terrain" checked /> Relief 3D
      </label>
      <label class="ctrl">
        Exag.
        <input type="range" id="exag" min="1" max="2.5" step="0.05" value="1.4" />
      </label>
    </div>

    <div class="hint">
      Glisser à 2 doigts (ou clic droit) pour incliner/pivoter · molette pour
      zoomer. Comparez fluidité et relief avec la version Cesium.
    </div>

    <div class="loading" id="loading"><div class="spin"></div>Chargement…</div>

    <script>
      // ── Données : on réutilise telles quelles celles du site ───────────────
      // resolvePointMedia (version minimale, alignée sur src/lib/media.ts) pour
      // retrouver la vignette d'un point depuis la médiathèque.
      function fileName(p) {
        return String(p || '').split(/[\\/]/).pop() || ''
      }
      function resolveThumb(point, lib) {
        const byName = (name) =>
          lib.find((m) => m.name?.toLowerCase() === String(name).toLowerCase())
        let media = point.mediaName ? byName(point.mediaName) : null
        const source = point.video || point.image
        if (!media && source) media = byName(fileName(source))
        if (media) return { thumb: media.thumbnailUrl || media.url, kind: media.kind }
        if (source && /^https?:|\//.test(source))
          return { thumb: source, kind: point.video ? 'video' : 'image' }
        return { thumb: null, kind: point.type }
      }

      async function loadProject() {
        // 1) Projet en ligne (mêmes données que le site).
        try {
          const r = await fetch('/api/project', { cache: 'no-store' })
          if (r.ok) {
            const j = await r.json()
            const p = j.project || j
            if (p && (p.traces || p.track)) return p
          }
        } catch (e) {}
        // 2) Repli statique (trace.gpx + points.json).
        try {
          const [gpxR, ptsR] = await Promise.all([
            fetch('/data/trace.gpx'),
            fetch('/data/points.json'),
          ])
          const traces = []
          if (gpxR.ok) {
            const xml = new DOMParser().parseFromString(
              await gpxR.text(),
              'application/xml',
            )
            const pts = [...xml.querySelectorAll('trkpt')].map((n) => ({
              lat: parseFloat(n.getAttribute('lat')),
              lng: parseFloat(n.getAttribute('lon')),
            }))
            traces.push({ id: 't0', name: 'Trace', points: pts, color: '#3cdc8c' })
          }
          const points = ptsR.ok ? await ptsR.json() : []
          return { traces, points, mediaLibrary: [] }
        } catch (e) {
          return { traces: [], points: [], mediaLibrary: [] }
        }
      }

      // ── Fonds de carte (sources gratuites, sans clé) ───────────────────────
      const RASTER = {
        sat: {
          tiles: [
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
          ],
          attribution: 'Imagery © Esri',
        },
        topo: {
          tiles: ['https://a.tile.opentopomap.org/{z}/{x}/{y}.png'],
          attribution: '© OpenTopoMap (CC-BY-SA)',
        },
      }
      function baseStyle(which) {
        return {
          version: 8,
          glyphs:
            'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
          sources: {
            base: {
              type: 'raster',
              tiles: RASTER[which].tiles,
              tileSize: 256,
              attribution: RASTER[which].attribution,
              maxzoom: 19,
            },
            // Relief : tuiles d'élévation AWS (encodage « terrarium »), gratuites.
            dem: {
              type: 'raster-dem',
              tiles: [
                'https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png',
              ],
              encoding: 'terrarium',
              tileSize: 256,
              maxzoom: 15,
            },
          },
          layers: [
            { id: 'bg', type: 'background', paint: { 'background-color': '#0c1512' } },
            { id: 'base', type: 'raster', source: 'base' },
            {
              id: 'hillshade',
              type: 'hillshade',
              source: 'dem',
              paint: { 'hillshade-exaggeration': 0.35 },
            },
          ],
        }
      }

      // ── Initialisation ─────────────────────────────────────────────────────
      ;(async function main() {
        const project = await loadProject()
        const traces =
          project.traces && project.traces.length
            ? project.traces
            : project.track
              ? [{ id: 't0', name: 'Trace', points: project.track, color: '#3cdc8c' }]
              : []
        const lib = project.mediaLibrary || []
        const points = project.points || []

        // Lignes de trace (GeoJSON, couleur par feature).
        const traceFC = {
          type: 'FeatureCollection',
          features: traces
            .filter((t) => t.points && t.points.length > 1)
            .map((t) => ({
              type: 'Feature',
              properties: { color: t.color || '#3cdc8c' },
              geometry: {
                type: 'LineString',
                coordinates: t.points.map((p) => [p.lng, p.lat]),
              },
            })),
        }

        // Points (GeoJSON, clusterisés).
        const pointFC = {
          type: 'FeatureCollection',
          features: points
            .filter((p) => Number.isFinite(p.lat) && Number.isFinite(p.lng))
            .map((p, i) => {
              const { thumb } = resolveThumb(p, lib)
              const color =
                p.color ||
                ({ photo: '#2f7fe0', video: '#8a5ce0', 360: '#e08436', poi: '#2aa377' }[
                  p.type
                ] || '#2aa377')
              return {
                type: 'Feature',
                properties: { pid: 'p' + i, thumb: thumb || '', color, title: p.title || '' },
                geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
              }
            }),
        }

        // Étendue de la trace pour le cadrage initial.
        const all = [
          ...traceFC.features.flatMap((f) => f.geometry.coordinates),
          ...pointFC.features.map((f) => f.geometry.coordinates),
        ]
        const bounds = all.reduce(
          (b, c) => [
            Math.min(b[0], c[0]), Math.min(b[1], c[1]),
            Math.max(b[2], c[0]), Math.max(b[3], c[1]),
          ],
          [Infinity, Infinity, -Infinity, -Infinity],
        )

        const map = new maplibregl.Map({
          container: 'map',
          style: baseStyle('sat'),
          bounds: all.length
            ? [[bounds[0], bounds[1]], [bounds[2], bounds[3]]]
            : [[10, 60], [11, 61]],
          fitBoundsOptions: { padding: 70, pitch: 62, maxZoom: 15 },
          maxPitch: 80,
          attributionControl: { compact: true },
          cooperativeGestures: false,
        })
        map.addControl(
          new maplibregl.NavigationControl({ visualizePitch: true }),
          'bottom-right',
        )

        let currentBase = 'sat'
        let markers = {}
        let onScreen = {}

        function addData() {
          if (!map.getSource('trace')) {
            map.addSource('trace', { type: 'geojson', data: traceFC })
            map.addLayer({
              id: 'trace-line',
              type: 'line',
              source: 'trace',
              layout: { 'line-join': 'round', 'line-cap': 'round' },
              paint: {
                'line-color': ['get', 'color'],
                'line-width': ['interpolate', ['linear'], ['zoom'], 8, 3, 16, 6],
                'line-opacity': 0.95,
              },
            })
          }
          if (!map.getSource('points')) {
            map.addSource('points', {
              type: 'geojson',
              data: pointFC,
              cluster: true,
              clusterRadius: 52,
              clusterMaxZoom: 17,
            })
            // Couche invisible : sert juste à alimenter querySourceFeatures.
            map.addLayer({
              id: 'points-probe',
              type: 'circle',
              source: 'points',
              paint: { 'circle-radius': 0, 'circle-opacity': 0 },
            })
          }
        }

        function setTerrain(on) {
          map.setTerrain(on ? { source: 'dem', exaggeration: +exag.value } : null)
        }

        // ── Marqueurs HTML synchronisés au clustering (pattern MapLibre) ──────
        function pointMarkerEl(props) {
          const wrap = document.createElement('div')
          wrap.className = 'mk-wrap'
          const el = document.createElement('div')
          if (props.thumb) {
            el.className = 'mk'
            el.style.backgroundImage = `url("${props.thumb}")`
          } else {
            el.className = 'mk dot'
            el.style.background = props.color
          }
          wrap.appendChild(el)
          return wrap
        }
        function clusterMarkerEl(props, srcId, clusterId) {
          const wrap = document.createElement('div')
          wrap.className = 'mk-wrap'
          const el = document.createElement('div')
          el.className = 'mk'
          el.style.background = '#20302a'
          wrap.appendChild(el)
          const badge = document.createElement('div')
          badge.className = 'mk-count'
          badge.textContent = props.point_count_abbreviated
          wrap.appendChild(badge)
          // Photo représentative : 1re feuille du groupe (asynchrone).
          map
            .getSource(srcId)
            .getClusterLeaves(clusterId, 1, 0)
            .then((leaves) => {
              const t = leaves && leaves[0] && leaves[0].properties.thumb
              if (t) el.style.backgroundImage = `url("${t}")`
              else el.style.background = props.color || '#2aa377'
            })
            .catch(() => {})
          return wrap
        }

        function updateMarkers() {
          const newMarkers = {}
          const feats = map.querySourceFeatures('points')
          for (const f of feats) {
            const coords = f.geometry.coordinates
            const p = f.properties
            let id, el
            if (p.cluster) {
              id = 'c' + p.cluster_id
              if (!markers[id]) {
                el = clusterMarkerEl(p, 'points', p.cluster_id)
                const m = new maplibregl.Marker({ element: el }).setLngLat(coords)
                el.addEventListener('click', () => {
                  map
                    .getSource('points')
                    .getClusterExpansionZoom(p.cluster_id)
                    .then((z) =>
                      map.easeTo({ center: coords, zoom: z, duration: 500 }),
                    )
                })
                markers[id] = m
              }
            } else {
              id = p.pid
              if (!markers[id]) {
                el = pointMarkerEl(p)
                markers[id] = new maplibregl.Marker({ element: el }).setLngLat(
                  coords,
                )
              }
            }
            newMarkers[id] = markers[id]
            if (!onScreen[id]) markers[id].addTo(map)
          }
          for (const id in onScreen) if (!newMarkers[id]) onScreen[id].remove()
          onScreen = newMarkers
        }

        map.on('load', () => {
          addData()
          setTerrain(true)
          map.setPitch(62) // garantit l'inclinaison 3D au démarrage
          const l = document.getElementById('loading')
          if (l) l.remove()
        })
        map.on('render', () => {
          if (!map.getSource('points') || !map.isSourceLoaded('points')) return
          updateMarkers()
        })

        // ── Contrôles HUD ────────────────────────────────────────────────────
        const exag = document.getElementById('exag')
        document.getElementById('terrain').addEventListener('change', (e) => {
          setTerrain(e.target.checked)
        })
        exag.addEventListener('input', () => {
          if (document.getElementById('terrain').checked) setTerrain(true)
        })
        document.getElementById('basemap').addEventListener('click', (e) => {
          const btn = e.target.closest('button')
          if (!btn) return
          const which = btn.dataset.base
          if (which === currentBase) return
          currentBase = which
          ;[...e.currentTarget.children].forEach((b) =>
            b.classList.toggle('active', b === btn),
          )
          // Échange juste les tuiles du fond : terrain/points/trace conservés.
          map.getSource('base').setTiles(RASTER[which].tiles)
        })
      })()
    </script>
  </body>
</html>
